src:
  - changed-files:
      - any-glob-to-any-file: "src/**"

public:
  - changed-files:
      - any-glob-to-any-file: "public/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "next.config.ts"
          - "tailwind.config.ts"
          - "tsconfig.json"
          - "package.json"
