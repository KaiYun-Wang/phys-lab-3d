server:
  port: ${phys-lab.server.port}

spring:
  application:
    name: backend
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: ${phys-lab.datasource.driver-class-name}
    url: jdbc:postgresql://${phys-lab.datasource.host}:${phys-lab.datasource.port}/${phys-lab.datasource.database}
    username: ${phys-lab.datasource.username}
    password: ${phys-lab.datasource.password}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${phys-lab.mybatis.log-impl}
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

phys-lab:
  jwt:
    secret: phys-lab-3d
    expiration-ms: 86400000
  ai:
    # 对话与向量可分开配置（例如 DeepSeek 对话 + 其它厂商 Embedding）
    chat:
      api-key: ${PHYS_LAB_AI_CHAT_API_KEY:}
      base-url: ${PHYS_LAB_AI_CHAT_BASE_URL:https://api.deepseek.com}
      model: ${PHYS_LAB_AI_CHAT_MODEL:deepseek-chat}
    embedding:
      api-key: ${PHYS_LAB_AI_EMBEDDING_API_KEY:}
      base-url: ${PHYS_LAB_AI_EMBEDDING_BASE_URL:https://api.openai.com/v1}
      model: ${PHYS_LAB_AI_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-0.6B}
      dimensions: 1024
    rag-top-k: 4
    history-limit: 20

dromara:
  x-file-storage:
    default-platform: minio-1
    minio:
      - platform: minio-1
        enable-storage: true
        access-key: ${phys-lab.minio.access-key}
        secret-key: ${phys-lab.minio.secret-key}
        end-point: ${phys-lab.minio.endpoint}
        bucket-name: ${phys-lab.minio.bucket}
        domain: ${phys-lab.minio.domain}
        base-path: avatars/
      - platform: minio-covers
        enable-storage: true
        access-key: ${phys-lab.minio.access-key}
        secret-key: ${phys-lab.minio.secret-key}
        end-point: ${phys-lab.minio.endpoint}
        bucket-name: ${phys-lab.minio.bucket}
        domain: ${phys-lab.minio.domain}
        base-path: covers/
