<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 / 注册 — PhysLab 3D</title>
  <style>
    :root {
      --sx-black: #000;
      --sx-hairline: #45454f;
      --sx-hairline-strong: #62626e;
      --sx-white: #fff;
      --sx-mute: #e8e8f0;
      --sx-ink-mute: #8a8a96;
      --sx-shadow-panel: 0 4px 16px rgba(0,0,0,.5), 0 20px 48px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
      --font-display: "Arial Narrow", "Arial Black", Arial, sans-serif;
      --font-body: Arial, Verdana, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--sx-black);
      color: var(--sx-white);
      font-family: var(--font-body);
      letter-spacing: .32px;
    }
    .page-shell {
      flex: 1;
      width: 80%;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0;
    }
    .navbar {
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--sx-hairline);
    }
    .navbar-inner {
      width: 80%;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sx-eyebrow {
      font-size: 12px;
      letter-spacing: .96px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--sx-mute);
    }
    .sx-display {
      font-family: var(--font-display);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .sx-panel {
      width: 100%;
      padding: 2rem;
      background: linear-gradient(165deg, #12121a 0%, #0c0c10 100%);
      border: 1px solid var(--sx-hairline);
      border-radius: 16px;
      box-shadow: var(--sx-shadow-panel);
    }
    .sx-chip {
      height: 36px;
      padding: 0 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .96px;
      text-transform: uppercase;
      color: var(--sx-ink-mute);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--sx-hairline);
      border-radius: 9999px;
      cursor: pointer;
    }
    .sx-chip-active {
      border-color: var(--sx-white);
      color: var(--sx-white);
      background: rgba(255,255,255,.1);
    }
    .tab-row { display: flex; gap: 8px; margin: 1.5rem 0; }
    .sx-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .sx-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sx-mute);
    }
    .sx-input {
      height: 44px;
      padding: 0 16px;
      background: rgba(0,0,0,.4);
      border: 1px solid var(--sx-hairline);
      border-radius: 12px;
      color: var(--sx-white);
      font-size: 14px;
    }
    .sx-input:focus { outline: none; border-color: var(--sx-hairline-strong); }
    .sx-hint { font-size: 12px; color: var(--sx-ink-mute); }
    .btn-ghost {
      width: 100%;
      min-height: 44px;
      padding: 12px 24px;
      background: rgba(255,255,255,.05);
      color: var(--sx-white);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.17px;
      text-transform: uppercase;
      border: 1px solid var(--sx-hairline-strong);
      border-radius: 9999px;
      cursor: pointer;
    }
    .btn-ghost:hover { background: var(--sx-white); color: var(--sx-black); }
    .form-pane { display: none; }
    .form-pane.active { display: block; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a href="/" class="sx-eyebrow" style="color:#fff;">PhysLab 3D</a>
      <a href="/" class="sx-eyebrow" style="color:#fff;">返回首页</a>
    </div>
  </header>

  <main class="page-shell">
    <div class="sx-panel">
      <h1 class="sx-display" id="form-title" style="font-size:1.25rem;">登录</h1>

      <div class="tab-row">
        <button type="button" class="sx-chip sx-chip-active" data-tab="login">登录</button>
        <button type="button" class="sx-chip" data-tab="register">注册</button>
      </div>

      <div id="pane-login" class="form-pane active">
        <form onsubmit="return false;">
          <div class="sx-field">
            <label class="sx-label" for="login-username">用户名</label>
            <input class="sx-input" id="login-username" type="text" minlength="3" maxlength="20" placeholder="3–20 个字符" />
          </div>
          <div class="sx-field">
            <label class="sx-label" for="login-password">密码</label>
            <input class="sx-input" id="login-password" type="password" minlength="5" maxlength="20" placeholder="5–20 个字符" />
          </div>
          <button type="submit" class="btn-ghost">登录</button>
        </form>
      </div>

      <div id="pane-register" class="form-pane">
        <form onsubmit="return false;">
          <div class="sx-field">
            <label class="sx-label" for="reg-username">用户名</label>
            <input class="sx-input" id="reg-username" type="text" minlength="3" maxlength="20" placeholder="3–20 个字符" />
          </div>
          <div class="sx-field">
            <label class="sx-label" for="reg-password">密码</label>
            <input class="sx-input" id="reg-password" type="password" minlength="5" maxlength="20" placeholder="5–20 个字符" />
          </div>
          <div class="sx-field">
            <label class="sx-label" for="reg-password2">确认密码</label>
            <input class="sx-input" id="reg-password2" type="password" minlength="5" maxlength="20" placeholder="再次输入密码" />
          </div>
          <button type="submit" class="btn-ghost">注册</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const tabs = document.querySelectorAll("[data-tab]");
    const panes = {
      login: document.getElementById("pane-login"),
      register: document.getElementById("pane-register"),
    };
    const title = document.getElementById("form-title");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const name = tab.dataset.tab;
        tabs.forEach((t) => t.classList.toggle("sx-chip-active", t.dataset.tab === name));
        Object.entries(panes).forEach(([key, pane]) => pane.classList.toggle("active", key === name));
        title.textContent = name === "login" ? "登录" : "注册";
      });
    });
  </script>
</body>
</html>
